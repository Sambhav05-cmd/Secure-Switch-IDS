version: "3.8"

networks:
  sdn-net:
    driver: bridge

volumes:
  block-pipe:    # shared volume for the named pipe between controller and block-agent

services:

  controller:
    build: ./controller
    container_name: os-ken-ctrl
    networks:
      - sdn-net
    ports:
      - "6633:6633"
    volumes:
      - block-pipe:/tmp   # controller creates /tmp/block_pipe here

  ovs-switch:
    build: ./ovs
    container_name: ovs-switch
    privileged: true
    networks:
      - sdn-net
    depends_on:
      - controller

  node1:
    build: ./node
    container_name: node1
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  node2:
    build: ./node
    container_name: node2
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  node3:
    build: ./node
    container_name: node3
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  attacker:
    build: ./attacker
    container_name: attacker
    privileged: true
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
      - NET_RAW

  block-agent:
    build: ./controller
    container_name: block-agent
    networks:
      - sdn-net
    volumes:
      - /var/log/snort:/var/log/snort:ro   # host snort alerts (read-only)
      - block-pipe:/tmp                    # shared pipe with controller
    environment:
      SNORT_ALERT_FILE: "/var/log/snort/alert"
      BLOCK_TIMEOUT_SECONDS: "0"
      WHITELIST_IPS: ""
    command: ["python", "/app/block_agent.py"]
    depends_on:
      - controller
    restart: unless-stopped
