version: "3.8"

networks:
  sdn-net:
    driver: bridge

services:

  controller:
    build: ./controller
    container_name: os-ken-ctrl
    networks:
      - sdn-net
    ports:
      - "6633:6633"
      - "8080:8080"

  ovs-switch:
    build: ./ovs
    container_name: ovs-switch
    privileged: true
    networks:
      - sdn-net
    depends_on:
      - controller

  node1:
    build: ./node
    container_name: node1
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  node2:
    build: ./node
    container_name: node2
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  node3:
    build: ./node
    container_name: node3
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
    depends_on:
      - ovs-switch

  attacker:
    build: ./attacker
    container_name: attacker
    privileged: true
    networks:
      - sdn-net
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # block-agent reads snort alerts — now reads from host's /var/log/snort
  block-agent:
    build: ./controller
    container_name: block-agent
    networks:
      - sdn-net
    volumes:
      - /var/log/snort:/var/log/snort:ro   # mount host snort log dir read-only
    command: ["python", "/app/block_agent.py"]
    depends_on:
      - controller

# NOTE: snort service removed entirely.
# Snort now runs on the HOST, managed by run.sh.
# To stop Snort:  sudo pkill -f 'snort -i snort0'
# Alert log:      sudo tail -f /var/log/snort/alert